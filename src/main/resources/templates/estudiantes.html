<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SpringEdu Manager | Gestión de Estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 12px; }
        .table-hover tbody tr:hover { background-color: #f1f5f9; transition: 0.2s; }
        .badge-curso { font-size: 0.85em; padding: 0.5em 0.7em; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-mortarboard-fill text-warning me-2"></i>SpringEdu Manager
            </a>
            <span class="navbar-text">
                <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm rounded-pill fw-bold">
                    <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
                </a>
            </span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            
            <div class="col-lg-4 mb-4">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white border-0" style="border-top-left-radius: 12px; border-top-right-radius: 12px;">
                        <h5 class="card-title mb-0 py-1"><i class="bi bi-person-plus-fill me-2"></i>Ingresar Estudiante</h5>
                    </div>
                    <div class="card-body bg-white">
                        <form th:action="@{/estudiantes/guardar}" method="post">
                            <div class="mb-3">
                                <label class="form-label text-secondary fw-semibold small">Nombre completo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
                                    <input type="text" name="nombre" class="form-control" placeholder="Ej. Ana Soto" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-secondary fw-semibold small">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" name="email" class="form-control" placeholder="ana@correo.cl" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-secondary fw-semibold small">Curso del Estudiante</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-journal-bookmark text-muted"></i></span>
                                    <select name="curso.id" class="form-select" required>
                                        <option value="" disabled selected>Seleccione el curso...</option>
                                        <option th:each="c : ${cursos}" th:value="${c.id}" th:text="${c.nombre}"></option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold rounded-pill shadow-sm">
                                <i class="bi bi-save me-1"></i> Confirmar Ingreso
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-3">
                        <h5 class="card-title mb-0 fw-bold text-dark"><i class="bi bi-people-fill text-primary me-2"></i>Estudiantes Inscritos</h5>
                        <span class="badge bg-primary rounded-pill px-3 py-2" th:text="${estudiantes.size()} + ' Total'">0 Total</span>
                    </div>
                    <div class="card-body p-0 table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-secondary small">
                                <tr>
                                    <th class="ps-4">ID</th>
                                    <th>Estudiante</th>
                                    <th>Correo</th>
                                    <th>Curso</th>
                                    <th class="text-center pe-4">Eliminar estudiante</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="e : ${estudiantes}">
                                    <td class="ps-4 fw-bold text-muted">#<span th:text="${e.id}"></span></td>
                                    <td class="fw-semibold text-dark" th:text="${e.nombre}"></td>
                                    <td><a th:href="'mailto:' + ${e.email}" class="text-decoration-none text-secondary"><i class="bi bi-envelope me-1"></i><span th:text="${e.email}"></span></a></td>
                                    <td>
                                        <span class="badge bg-success bg-opacity-75 rounded-pill badge-curso shadow-sm" 
                                              th:text="${e.curso != null ? e.curso.nombre : 'Sin asignar'}">
                                        </span>
                                    </td>
                                    <td class="text-center pe-4">
                                        <a th:href="@{/estudiantes/eliminar/{id}(id=${e.id})}" 
                                           class="btn btn-outline-danger btn-sm rounded-pill"
                                           onclick="return confirm('¿Confirma que desea retirar a este estudiante del sistema?');"
                                           title="Eliminar registro">
                                           <i class="bi bi-trash3-fill"></i>
                                        </a>
                                    </td>
                                </tr>
                                <tr th:if="${estudiantes.isEmpty()}">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                        Aún no hay estudiantes matriculados en el sistema.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
